services:
  docproc:
    image: india-alt-docproc:latest
    container_name: docproc
    restart: unless-stopped
    ports:
      - "8100:8100"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8100/health', timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 5
